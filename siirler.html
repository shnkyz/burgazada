<title>Şiirler - Burgazada</title>

<style>
body{
font-family:Georgia, serif;
background:#faf7f2;
margin:0;
padding:40px;
color:#222;
}

h1{
text-align:center;
margin-bottom:50px;
}

.poem{
max-width:600px;
margin:0 auto 60px auto;

}

<body>

<h1>Burgazada</h1>

<div class="poem">
Bir ada düşün<br><br>
kelimeler kıyıya vuruyor<br><br>
biraz deniz<br>
biraz sessizlik<br><br>
ve içinden geçen<br>
birkaç dize
</div>

<div class="poem">
Yan masada iki fincan vardı<br><br>
biri falına bakılmış<br>
diğeri kapalıydı<br><br>
ve kimse yoktu<br>
uçaklarına binip gitmişlerdi
</div>

<div class="footer">
Her şiir biraz acıdan doğar.<br>
Burgazada
</div>

</body>
